name: CI

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        if: runner.os == 'Linux'
        run: |
          packages="build-essential cmake ninja-build git pkg-config ca-certificates libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libasound2-dev libudev-dev"
          for attempt in 1 2 3 4 5; do
            sudo apt-get -o Acquire::Retries=5 update || true
            sudo apt-get -o Acquire::Retries=5 install -y --no-install-recommends $packages && break
            if [ "$attempt" = "5" ]; then exit 1; fi
            sleep $((attempt * 10))
          done

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        run: choco install ninja -y --no-progress

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: brew install ninja

      - name: Check core boundary
        if: runner.os == 'Linux'
        run: bash scripts/check-core-boundary.sh

      - name: Configure Debug
        run: cmake --preset debug

      - name: Build Debug
        run: cmake --build --preset debug

      - name: Test Debug
        run: ctest --test-dir build/debug --output-on-failure

      - name: Configure Release
        run: cmake --preset release

      - name: Build Release
        run: cmake --build --preset release

      - name: Install Release
        run: cmake --install build/release --prefix dist

      - name: Verify package layout
        shell: bash
        run: |
          test -f dist/tet_ray_game_app || test -f dist/tet_ray_game_app.exe
          test -d dist/assets/fonts
          test -d dist/assets/sounds
          test -f dist/README.md

  quality-linux:
    name: quality-linux
    runs-on: ubuntu-latest
    env:
      CMAKE_GENERATOR: Ninja
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ubuntu dependencies
        run: |
          packages="build-essential cmake ninja-build git pkg-config ca-certificates libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev libasound2-dev libudev-dev"
          for attempt in 1 2 3 4 5; do
            sudo apt-get -o Acquire::Retries=5 update || true
            sudo apt-get -o Acquire::Retries=5 install -y --no-install-recommends $packages && break
            if [ "$attempt" = "5" ]; then exit 1; fi
            sleep $((attempt * 10))
          done

      - name: Check core boundary
        run: bash scripts/check-core-boundary.sh

      - name: Configure Debug Sanitizers
        run: cmake --preset debug-sanitize

      - name: Build Debug Sanitizers
        run: cmake --build --preset debug-sanitize

      - name: Test Debug Sanitizers
        run: ctest --test-dir build/debug-sanitize --output-on-failure
